<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ImgPDF Pro — Image to PDF Converter</title>
  <meta name="description" content="Professional Image to PDF — drag & drop, reorder, rotate, DPI control, custom pages, and more.">

  <!-- ── PWA Meta ── -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6dfa" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#7c6dfa" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ImgPDF Pro">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- ── Libraries ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pica/9.0.1/pica.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Processing Overlay -->
<div class="overlay-proc" id="processingOverlay">
  <div class="proc-card">
    <div class="proc-rings"><span></span><span></span><span></span></div>
    <p class="proc-title">Building your PDF</p>
    <span class="proc-sub" id="overlayStatus">Preparing…</span>
    <div class="proc-bar-wrap"><div class="proc-bar" id="overlayBar"></div></div>
    <span class="proc-count" id="overlayCount"></span>
  </div>
</div>

<!-- Image Modal -->
<div class="modal" id="imageModal" role="dialog" aria-modal="true" aria-label="Image preview">
  <button class="modal-close" id="modalClose" aria-label="Close preview">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
  <div class="modal-stage">
    <img src="" alt="Preview" id="modalImg">
  </div>
  <div class="modal-meta" id="modalMeta"></div>
</div>

<!-- Toasts -->
<div class="toasts" id="toastContainer" aria-live="polite"></div>

<!-- Offline Banner -->
<div class="offline-banner" id="offlineBanner" hidden>
  <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.451l1.514 1.514a4 4 0 00-5.478-5.48zM8 16a2 2 0 11-4 0 2 2 0 014 0zM10 8a2 2 0 100 4 2 2 0 000-4z" clip-rule="evenodd"/></svg>
  You're offline — app still works from cache
</div>

<!-- Mobile: drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- App Shell -->
<div class="shell">

  <!-- ── LEFT PANEL ── -->
  <aside class="panel" aria-label="PDF settings">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="18" height="24" rx="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="M6 9h10M6 13h10M6 17h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="12" y="13" width="18" height="16" rx="3" fill="var(--bg)" stroke="var(--accent)" stroke-width="1.8"/>
          <path d="M17 19l2.5 3 4.5-5" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>ImgPDF <em>Pro</em></h1>
        <p>Image to PDF converter</p>
      </div>
      <button class="btn-icon" id="themeToggle" title="Toggle theme" aria-label="Toggle light/dark theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="panel-close" id="panelClose" aria-label="Close settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- HUD Stats -->
    <div class="hud" id="hud">
      <div class="hud-stat"><strong id="count">0</strong><span>Images</span></div>
      <div class="hud-sep"></div>
      <div class="hud-stat"><strong id="totalSize">—</strong><span>Total</span></div>
      <div class="hud-sep"></div>
      <div class="hud-stat"><strong id="pages">A4</strong><span>Format</span></div>
    </div>

    <!-- Settings -->
    <div class="settings">

      <div class="s-section">
        <div class="s-head">Output</div>
        <div class="s-field">
          <label class="s-label" for="filename">PDF Filename</label>
          <div class="input-wrap">
            <input type="text" id="filename" class="s-input" placeholder="converted-images">
            <span class="input-affix">.pdf</span>
          </div>
        </div>
        <div class="s-field">
          <label class="s-label" for="quality">Quality — <span class="mono" id="qualityValue">92%</span></label>
          <input type="range" id="quality" class="s-range" min="10" max="100" value="92">
        </div>
        <div class="s-field">
          <label class="s-label" for="dpi">Resolution</label>
          <select id="dpi" class="s-input">
            <option value="72">72 DPI — Screen / Web</option>
            <option value="150" selected>150 DPI — Standard Print</option>
            <option value="300">300 DPI — High-Quality Print</option>
          </select>
        </div>
      </div>

      <div class="s-section">
        <div class="s-head">Page</div>
        <div class="s-row">
          <div class="s-field">
            <label class="s-label" for="pageSize">Size</label>
            <select id="pageSize" class="s-input">
              <option value="a4">A4 (210×297mm)</option>
              <option value="a3">A3 (297×420mm)</option>
              <option value="letter">Letter (216×279mm)</option>
              <option value="custom">Custom…</option>
            </select>
          </div>
          <div class="s-field">
            <label class="s-label" for="orientation">Orientation</label>
            <select id="orientation" class="s-input">
              <option value="portrait">Portrait</option>
              <option value="landscape">Landscape</option>
            </select>
          </div>
        </div>
        <div id="customSizeRow" class="s-row" style="display:none">
          <div class="s-field">
            <label class="s-label" for="customW">Width (mm)</label>
            <input type="number" id="customW" class="s-input" min="1" placeholder="210">
          </div>
          <div class="s-field">
            <label class="s-label" for="customH">Height (mm)</label>
            <input type="number" id="customH" class="s-input" min="1" placeholder="297">
          </div>
        </div>
        <div class="s-row">
          <div class="s-field">
            <label class="s-label" for="margin">Margin (mm)</label>
            <input type="number" id="margin" class="s-input" min="0" max="100" value="10">
          </div>
          <div class="s-field">
            <label class="s-label" for="imageFit">Image Fit</label>
            <select id="imageFit" class="s-input">
              <option value="fit">Fit (keep ratio)</option>
              <option value="stretch">Stretch (fill)</option>
              <option value="cover">Cover (crop)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="s-section">
        <div class="s-head">Options</div>
        <div class="s-toggles">
          <label class="s-toggle">
            <input type="checkbox" id="pageNumbers">
            <span class="tog-track"><span class="tog-dot"></span></span>
            <span class="tog-label">Add Page Numbers</span>
          </label>
          <label class="s-toggle">
            <input type="checkbox" id="preservePng">
            <span class="tog-track"><span class="tog-dot"></span></span>
            <span class="tog-label">Preserve PNG Transparency</span>
          </label>
        </div>
      </div>

    </div>

    <!-- Panel Footer -->
    <div class="panel-footer">
      <!-- PWA Install Button (hidden until prompt available) -->
      <button class="btn btn-install btn-sm" id="installBtn" hidden>
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        Install App
      </button>
      <div class="kbd-hints">
        <kbd>Esc</kbd> close preview &nbsp;·&nbsp; <kbd>Del</kbd> clear all
      </div>
      <button class="btn btn-danger btn-sm" id="removeAllBtn">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        Clear All
      </button>
    </div>

  </aside>

  <!-- ── RIGHT WORKSPACE ── -->
  <main class="workspace">

    <div class="ws-header">
      <div class="ws-header-l">
        <button class="btn-settings" id="settingsBtn" aria-label="Open settings">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
          Settings
        </button>
        <h2>Workspace</h2>
        <div class="sort-bar">
          <button class="sort-btn active" data-sort="none">Original</button>
          <button class="sort-btn" data-sort="name">A → Z</button>
          <button class="sort-btn" data-sort="size-asc">Smallest</button>
          <button class="sort-btn" data-sort="size-desc">Largest</button>
        </div>
      </div>
      <div class="ws-header-r">
        <div class="thumb-sizer">
          <svg viewBox="0 0 16 16" fill="currentColor" width="13" height="13">
            <rect x="0.5" y="0.5" width="6" height="6" rx="1.5"/>
            <rect x="9.5" y="0.5" width="6" height="6" rx="1.5"/>
            <rect x="0.5" y="9.5" width="6" height="6" rx="1.5"/>
            <rect x="9.5" y="9.5" width="6" height="6" rx="1.5"/>
          </svg>
          <input type="range" id="thumbSize" min="100" max="240" value="150" step="10" title="Thumbnail size">
        </div>
        <button class="btn btn-primary btn-sm" id="uploadBtn">

            <path d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5z"/>
          </svg>
          Add Images
        </button>
      </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" multiple>

    <div class="grid-area">
      <div class="drop-zone" id="drop-zone">
        <div class="dz-art">
          <div class="dz-layer dz-layer--c">
            <svg viewBox="0 0 96 72" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="90" height="66" rx="8"/>
              <circle cx="24" cy="24" r="8" opacity=".45"/>
              <path d="M3 50 25 32l16 14 16-12 36 18" opacity=".4"/>
            </svg>
          </div>
          <div class="dz-layer dz-layer--b">
            <svg viewBox="0 0 96 72" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="90" height="66" rx="8"/>
              <circle cx="24" cy="24" r="8" opacity=".55"/>
              <path d="M3 48 26 30l14 15 18-11 35 18" opacity=".5"/>
            </svg>
          </div>
          <div class="dz-layer dz-layer--f">
            <svg viewBox="0 0 96 72" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="90" height="66" rx="8"/>

    <div class="ws-footer">

  </main>

  <!-- Mobile Bottom Bar -->
  <div class="mobile-bar" id="mobileBar">
    <button class="mobile-btn" id="mobileSettingsBtn" aria-label="Settings">

    <button class="mobile-btn mobile-btn--add" id="mobileAddBtn">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9.25 13.25a.75.75 0 001.5 0V4.636l2.955 3.129a.75.75 0 001.09-1.03l-4.25-4.5a.75.75 0 00-1.09 0l-4.25 4.5a.75.75 0 101.09 1.03L9.25 4.636v8.614z"/><path d="M3.5 12.75a.75.75 0 00-1.5 0v2.5A2.75 2.75 0 004.75 18h10.5A2.75 2.75 0 0018 15.25v-2.5a.75.75 0 00-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5z"/></svg>
      Add
    </button>
    <button class="mobile-btn mobile-btn--export" id="mobileExportBtn" disabled>

      Export
    </button>
  </div>
</div>

<!-- ── PWA: Service Worker Registration ── -->
<script>
(function () {
  'use strict';

  /* ── Register Service Worker ── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(reg => {
          console.log('[PWA] SW registered, scope:', reg.scope);

          // New SW waiting → offer reload
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                _showUpdateToast(newSW);
              }
            });
          });
        })
        .catch(err => console.warn('[PWA] SW registration failed:', err));

      // Reload after SW takeover
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; location.reload(); }
      });
    });
  }

  /* ── Offline / Online indicator ── */
  const banner = document.getElementById('offlineBanner');

  function updateOnlineStatus() {
    if (!navigator.onLine) {
      banner.removeAttribute('hidden');
    } else {
      banner.setAttribute('hidden', '');
    }
  }

  window.addEventListener('offline', updateOnlineStatus);
  window.addEventListener('online',  updateOnlineStatus);
  updateOnlineStatus();

  /* ── PWA Install prompt ── */
  let deferredPrompt = null;
  const installBtn   = document.getElementById('installBtn');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.removeAttribute('hidden');
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('[PWA] Install outcome:', outcome);
    deferredPrompt = null;
    installBtn.setAttribute('hidden', '');
  });

  window.addEventListener('appinstalled', () => {
    installBtn.setAttribute('hidden', '');
    deferredPrompt = null;
    console.log('[PWA] App installed.');
  });

  /* ── Show update toast ── */
  function _showUpdateToast(sw) {
    const container = document.getElementById('toastContainer');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <span class="toast-msg">Update available!</span>
      <button class="toast-action" id="swReloadBtn">Reload</button>
    `;
    container.appendChild(toast);

    document.getElementById('swReloadBtn').addEventListener('click', () => {
      sw.postMessage({ type: 'SKIP_WAITING' });
      toast.remove();
    });
  }
})();
</script>

</body>
</html>
